<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rayson Lim" />
    <script>
      // Restore deep links redirected through /404.html on GitHub Pages.
      (function (location) {
        if (location.search[1] !== "/") return;
        const decoded = location.search
          .slice(1)
          .replace(/~and~/g, "&")
          .split("&");
        const path = decoded.shift() ?? "";
        const query = decoded.length ? `?${decoded.join("&")}` : "";
        const hash = location.hash ?? "";
        window.history.replaceState(null, "", path + query + hash);
      })(window.location);
    </script>
    <title>Rayson Lim</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
